<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Capacitaciones de Mantenimiento</title>
  <style>
    :root {
      --bg-principal: #121214;
      --bg-tarjeta: #1e1e24;
      --txt-principal: #f3f4f6;
      --txt-secundario: #9ca3af;
      --borde: #374151;
      --azul-acento: #3b82f6;
      --azul-active: #1d4ed8;
      --verde-exito: #10b981;
      --rojo-alerta: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-principal);
      margin: 0;
      padding: 12px;
      color: var(--txt-principal);
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-tarjeta);
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      border: 1px solid #2d2d34;
    }

    /* ESTILOS DEL ENCABEZADO CORPORATIVO */
    .header-empresa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--borde);
    }

    .logo-empresa {
      width: 55px;
      height: 55px;
      object-fit: contain;
    }

    .titulo-empresa {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--txt-principal);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--txt-secundario);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--borde);
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 1rem;
      background-color: #2a2a32;
      color: var(--txt-principal);
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--azul-acento);
    }

    /* PANELES DE HISTORIAL DE CAPACITACIONES */
    .status-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .panel-cursos {
      background: #25252d;
      border-radius: 8px;
      padding: 10px;
      border: 1px solid var(--borde);
      max-height: 150px;
      overflow-y: auto;
    }

    .panel-titulo {
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--borde);
    }

    .titulo-completados { color: var(--verde-exito); }
    .titulo-faltantes { color: var(--rojo-alerta); }

    .lista-items {
      margin: 0;
      padding-left: 14px;
      font-size: 0.8rem;
      color: #e5e7eb;
      line-height: 1.4;
    }

    .lista-items li {
      margin-bottom: 4px;
    }

    .cargando-status {
      font-size: 0.8rem;
      color: #eab308;
      font-style: italic;
      text-align: center;
      grid-column: span 2;
      display: none;
    }

    /* CANVAS DE FIRMA DIGITAL */
    .firma-container {
      position: relative;
    }

    canvas {
      width: 100%;
      height: 130px;
      background-color: #ffffff;
      border: 2px solid var(--borde);
      border-radius: 10px;
      touch-action: none;
    }

    .firma-botones {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn-limpiar {
      padding: 6px 12px;
      background-color: #374151;
      color: #f3f4f6;
      border: none;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .btn-guardar {
      width: 100%;
      padding: 15px;
      background-color: var(--azul-acento);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 14px;
    }

    .btn-guardar:active { background-color: var(--azul-active); }
    .btn-guardar:disabled { background-color: #4b5563; color: #9ca3af; }
  </style>
</head>
<body>

<div class="container">
  
  <div class="header-empresa">
    <img src="https://seguridadtce15-bit.github.io/capacitaciones-mantenimiento-tce/logo.png" alt="Logo TCE" class="logo-empresa" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg';">
    <div>
      <h1 class="titulo-empresa">Terminales de Cargas Especializadas S.A. de C.V.</h1>
    </div>
  </div>
  
  <div class="form-group">
    <label for="buscadorEmpleado">Colaborador:</label>
    <input type="text" id="buscadorEmpleado" list="listaPersonal" placeholder="Escribe nombre del colaborador..." autocomplete="off">
    <datalist id="listaPersonal"></datalist>
    <input type="hidden" id="idEmpleado">
    <input type="hidden" id="puestoEmpleado">
  </div>

  <div class="status-container">
    <div id="msgCargando" class="cargando-status">Consultando historial en Sheets...</div>
    
    <div class="panel-cursos">
      <div class="panel-titulo titulo-completados">✓ Realizados</div>
      <ul id="listaCompletados" class="lista-items"></ul>
    </div>
    
    <div class="panel-cursos">
      <div class="panel-titulo titulo-faltantes">✗ Pendientes</div>
      <ul id="listaFaltantes" class="lista-items"></ul>
    </div>
  </div>

  <div class="form-group">
    <label for="selectActividad">Curso Impartido:</label>
    <select id="selectActividad">
      <option value="">Seleccione un curso...</option>
    </select>
  </div>

  <div class="form-group">
    <label for="inputInstructor">Instructor:</label>
    <input type="text" id="inputInstructor" placeholder="Nombre del instructor">
  </div>

  <div class="form-group">
    <label for="selectEstatus">Estatus:</label>
    <select id="selectEstatus">
      <option value="Aprobado">Aprobado</option>
      <option value="Pendiente">Pendiente</option>
      <option value="Reprobado">Reprobado</option>
    </select>
  </div>

  <div class="form-group">
    <label>Firma de Conformidad del Trabajador:</label>
    <div class="firma-container">
      <canvas id="canvasFirma"></canvas>
      <div class="firma-botones">
        <button type="button" class="btn-limpiar" onclick="limpiarFirma()">Borrar Trazo</button>
      </div>
    </div>
  </div>

  <button class="btn-guardar" id="btnRegistrar" onclick="procesarEnvio(false)">Registrar Capacitación</button>
</div>

<script>
  // ⚠️ COLOCA AQUÍ TU URL DE EJECUCIÓN (WEB APP) DE GOOGLE APPS SCRIPT
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwEnrnLhUy_a5Ieb7I4gpGxLCW6otsOpvWCmrDy8KMEYUKBzg_E4yEAQeTMFh2kHxhWfw/exec";

  let personalCache = [];
  let actividadesCache = [];
  const canvas = document.getElementById('canvasFirma');
  const ctx = canvas.getContext('2d');
  let dibujando = false;

  window.addEventListener('DOMContentLoaded', () => {
    ajustarResolucionCanvas();
    inicializarEventosFirma();

    fetch(WEB_APP_URL)
      .then(response => response.json())
      .then(data => {
        personalCache = data.personal;
        actividadesCache = data.actividades;
        renderAutocompletarPersonal(data.personal);
        renderSelectActividades(data.actividades);
      })
      .catch(err => alert("Error cargando catálogos: " + err));
  });

  function renderAutocompletarPersonal(personal) {
    const datalist = document.getElementById('listaPersonal');
    datalist.innerHTML = '';
    personal.forEach(emp => {
      const option = document.createElement('option');
      option.value = emp.nombre; 
      datalist.appendChild(option);
    });
  }

  function renderSelectActividades(actividades) {
    const select = document.getElementById('selectActividad');
    actividades.forEach(act => {
      const option = document.createElement('option');
      option.value = act.id;
      option.textContent = act.nombre;
      select.appendChild(option);
    });
  }

  document.getElementById('buscadorEmpleado').addEventListener('input', (e) => {
    const seleccionado = personalCache.find(emp => emp.nombre === e.target.value);
    if (seleccionado) {
      document.getElementById('idEmpleado').value = seleccionado.id;
      document.getElementById('puestoEmpleado').value = seleccionado.puesto;
      consultarEstatusCursos(seleccionado.id);
    } else {
      document.getElementById('idEmpleado').value = '';
      document.getElementById('puestoEmpleado').value = '';
      limpiarPanelesStatus();
    }
  });

  function consultarEstatusCursos(idEmpleado) {
    const msg = document.getElementById('msgCargando');
    msg.style.display = 'block';
    
    fetch(`${WEB_APP_URL}?accion=obtenerEstatus&idEmpleado=${idEmpleado}`)
      .then(res => res.json())
      .then(estatus => {
        msg.style.display = 'none';
        const ulCompletados = document.getElementById('listaCompletados');
        const ulFaltantes = document.getElementById('listaFaltantes');
        
        ulCompletados.innerHTML = estatus.completados.length ? estatus.completados.map(c => `<li>${c}</li>`).join('') : '<li>Ninguno</li>';
        ulFaltantes.innerHTML = estatus.faltantes.length ? estatus.faltantes.map(f => `<li>${f}</li>`).join('') : '<li>Al día</li>';
      })
      .catch(err => {
        msg.style.display = 'none';
        console.error("Error al traer estatus:", err);
      });
  }

  function limpiarPanelesStatus() {
    document.getElementById('listaCompletados').innerHTML = '';
    document.getElementById('listaFaltantes').innerHTML = '';
    document.getElementById('msgCargando').style.display = 'none';
  }

  // ==========================================
  // MANEJO DE FIRMA DIGITAL
  // ==========================================
  function ajustarResolucionCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000000";
  }

  function inicializarEventosFirma() {
    canvas.addEventListener('mousedown', (e) => { dibujando = true; dibujar(e); });
    canvas.addEventListener('mousemove', dibujar);
    window.addEventListener('mouseup', () => dibujando = false);

    canvas.addEventListener('touchstart', (e) => {
      dibujando = true;
      const pos = obtenerPosicionFirma(e.touches[0]);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      e.preventDefault();
    });
    canvas.addEventListener('touchmove', (e) => {
      if (!dibujando) return;
      const pos = obtenerPosicionFirma(e.touches[0]);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      e.preventDefault();
    });
    canvas.addEventListener('touchend', () => dibujando = false);
  }

  function obtenerPosicionFirma(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: (e.clientX || e.pageX) - rect.left, y: (e.clientY || e.pageY) - rect.top };
  }

  function dibujar(e) {
    if (!dibujando) return;
    const pos = obtenerPosicionFirma(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }

  function limpiarFirma() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ajustarResolucionCanvas();
  }

  function canvasEstaVacio() {
    const buffer = new Uint32Array(ctx.getImageData(0, 0, canvas.width, canvas.height).data.buffer);
    return !buffer.some(color => color !== 0);
  }

  // ==========================================
  // ENVÍO AL DO-POST
  // ==========================================
  function procesarEnvio(forzar = false) {
    const idEmp = document.getElementById('idEmpleado').value;
    const nombreEmp = document.getElementById('buscadorEmpleado').value;
    const puestoEmp = document.getElementById('puestoEmpleado').value;
    const idAct = document.getElementById('selectActividad').value;
    const instructor = document.getElementById('inputInstructor').value;
    const estatus = document.getElementById('selectEstatus').value;

    const selectAct = document.getElementById('selectActividad');
    const nombreAct = selectAct.options[selectAct.selectedIndex]?.text || '';

    if (!idEmp || !idAct) {
      alert("⚠️ Por favor seleccione un Colaborador y un Curso.");
      return;
    }

    if (canvasEstaVacio()) {
      alert("⚠️ Se requiere la firma del colaborador como evidencia.");
      return;
    }

    const payloadData = {
      idEmpleado: idEmp,
      nombreEmpleado: nombreEmp,
      puestoEmpleado: puestoEmp,
      idActividad: idAct,
      nombreActividad: nombreAct,
      instructor: instructor || "Sin Instructor",
      estatus: estatus,
      firmaBase64: canvas.toDataURL('image/png'),
      forzarGuardado: forzar
    };

    const btn = document.getElementById('btnRegistrar');
    btn.disabled = true;
    btn.innerText = "Guardando...";

    fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ accion: "guardar", payload: payloadData })
    })
    .then(res => res.json())
    .then(respuesta => {
      btn.disabled = false;
      btn.innerText = "Registrar Capacitación";

      if (!respuesta.exito && respuesta.duplicado) {
        const volverARegistrar = confirm(respuesta.mensaje);
        if (volverARegistrar) {
          procesarEnvio(true);
        } else {
          alert("Registro cancelado.");
        }
      } 
      else if (respuesta.exito) {
        alert("✅ " + respuesta.mensaje);
        limpiarFormulario();
      } else {
        alert("⚠️ Error: " + respuesta.mensaje);
      }
    })
    .catch(err => {
      btn.disabled = false;
      btn.innerText = "Registrar Capacitación";
      alert("Error: " + err);
    });
  }

  function limpiarFormulario() {
    document.getElementById('buscadorEmpleado').value = '';
    document.getElementById('idEmpleado').value = '';
    document.getElementById('puestoEmpleado').value = '';
    document.getElementById('selectActividad').value = '';
    document.getElementById('inputInstructor').value = '';
    document.getElementById('selectEstatus').value = 'Aprobado';
    limpiarPanelesStatus();
    limpiarFirma();
  }
  
  window.addEventListener('resize', ajustarResolucionCanvas);
</script>

</body>
</html>
