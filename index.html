<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capacitaciones de Mantenimiento</title>
  <style>
    /* Estilos profesionales optimizados para uso en teléfono celular */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 15px;
      color: #333;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    h2 {
      text-align: center;
      color: #1a365d;
      margin-top: 0;
      font-size: 1.4rem;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #4a5568;
    }
    input[type="text"], select {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
      background-color: #fff;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #3182ce;
      box-shadow: 0 0 0 3px rgba(66,153,225,0.15);
    }
    .btn-guardar {
      width: 100%;
      padding: 14px;
      background-color: #2b6cb0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .btn-guardar:active {
      background-color: #1a365d;
    }
    /* Estilo simple para área de firma (puedes integrar tu canvas aquí) */
    .firma-placeholder {
      border: 2px dashed #cbd5e0;
      height: 120px;
      background: #fafafa;
      text-align: center;
      line-height: 120px;
      color: #718096;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Registro de Capacitación</h2>
  
  <div class="form-group">
    <label for="buscadorEmpleado">Colaborador:</label>
    <input type="text" id="buscadorEmpleado" list="listaPersonal" placeholder="Escribe nombre del colaborador..." autocomplete="off">
    <datalist id="listaPersonal"></datalist>
    <input type="hidden" id="idEmpleado">
    <input type="hidden" id="puestoEmpleado">
  </div>

  <div class="form-group">
    <label for="selectActividad">Curso Impartido:</label>
    <select id="selectActividad">
      <option value="">Seleccione un curso...</option>
    </select>
  </div>

  <div class="form-group">
    <label for="inputInstructor">Instructor:</label>
    <input type="text" id="inputInstructor" placeholder="Nombre del instructor">
  </div>

  <div class="form-group">
    <label for="selectEstatus">Estatus:</label>
    <select id="selectEstatus">
      <option value="Aprobado">Aprobado</option>
      <option value="Pendiente">Pendiente</option>
      <option value="Reprobado">Reprobado</option>
    </select>
  </div>

  <div class="form-group">
    <label>Firma de Conformidad:</label>
    <div class="firma-placeholder">[ Espacio para Firma Digital ]</div>
  </div>

  <button class="btn-guardar" id="btnRegistrar" onclick="procesarEnvio(false)">Registrar Capacitación</button>
</div>

<script>
  // ⚠️ REEMPLAZA CON TU URL DE EJECUCIÓN (WEB APP) DE GOOGLE APPS SCRIPT
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxhDbBbLv6t6cMMRfeEHpw4dR782-cU0QUqwTAo0ZXy03fPcqrzZEyFZ6oFJWHrCO4fzg/exec";

  // Variables globales para almacenar catálogos cargados
  let personalCache = [];
  let actividadesCache = [];

  // Al cargar la página, traemos los catálogos automáticamente de Sheets
  window.addEventListener('DOMContentLoaded', () => {
    fetch(WEB_APP_URL)
      .then(response => response.json())
      .then(data => {
        personalCache = data.personal;
        actividadesCache = data.actividades;
        
        // Inicializar los componentes visuales
        renderAutocompletarPersonal(data.personal);
        renderSelectActividades(data.actividades);
      })
      .catch(err => alert("Error cargando catálogos iniciales: " + err));
  });

  // Renderiza la lista oculta <datalist> para el autocompletado
  function renderAutocompletarPersonal(personal) {
    const datalist = document.getElementById('listaPersonal');
    datalist.innerHTML = '';
    personal.forEach(emp => {
      const option = document.createElement('option');
      option.value = emp.nombre; 
      datalist.appendChild(option);
    });
  }

  // Renderiza el selector de cursos/actividades
  function renderSelectActividades(actividades) {
    const select = document.getElementById('selectActividad');
    actividades.forEach(act => {
      const option = document.createElement('option');
      option.value = act.id;
      option.textContent = act.nombre;
      select.appendChild(option);
    });
  }

  // Detecta en tiempo real cuando seleccionan un colaborador válido del buscador
  document.getElementById('buscadorEmpleado').addEventListener('input', (e) => {
    const seleccionado = personalCache.find(emp => emp.nombre === e.target.value);
    if (seleccionado) {
      document.getElementById('idEmpleado').value = seleccionado.id;
      document.getElementById('puestoEmpleado').value = seleccionado.puesto;
    } else {
      document.getElementById('idEmpleado').value = '';
      document.getElementById('puestoEmpleado').value = '';
    }
  });

  // PROCESA EL ENVÍO HACIA GOOGLE APPS SCRIPT CON EL CANDADO DE SEGURIDAD
  function procesarEnvio(forzar = false) {
    const idEmp = document.getElementById('idEmpleado').value;
    const nombreEmp = document.getElementById('buscadorEmpleado').value;
    const puestoEmp = document.getElementById('puestoEmpleado').value;
    const idAct = document.getElementById('selectActividad').value;
    const instructor = document.getElementById('inputInstructor').value;
    const estatus = document.getElementById('selectEstatus').value;

    const selectAct = document.getElementById('selectActividad');
    const nombreAct = selectAct.options[selectAct.selectedIndex]?.text || '';

    // Validación básica en el teléfono antes de lanzar la conexión
    if (!idEmp || !idAct) {
      alert("⚠️ Por favor seleccione un Colaborador válido de la lista y un Curso.");
      return;
    }

    // Estructurar el paquete de datos (payload)
    const payloadData = {
      idEmpleado: idEmp,
      nombreEmpleado: nombreEmp,
      puestoEmpleado: puestoEmp,
      idActividad: idAct,
      nombreActividad: nombreAct,
      instructor: instructor || "Sin Instructor",
      estatus: estatus,
      firmaBase64: "data:image/png;base64,", // Sustituye con el base64 real de tu firma si usas canvas
      forzarGuardado: forzar
    };

    // Bloquear el botón temporalmente por UX móvil
    const btn = document.getElementById('btnRegistrar');
    btn.disabled = true;
    btn.innerText = "Guardando...";

    // Envío por POST al servidor
    fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        accion: "guardar",
        payload: payloadData
      })
    })
    .then(res => res.json())
    .then(respuesta => {
      btn.disabled = false;
      btn.innerText = "Registrar Capacitación";

      // Si el servidor detecta duplicado (exito = false y duplicado = true)
      if (!respuesta.exito && respuesta.duplicado) {
        // Lanzamos la ventana nativa de confirmación (SÍ / NO) en el celular
        const volverARegistrar = confirm(respuesta.mensaje);
        if (volverARegistrar) {
          // Si pulsa "Aceptar", relanzamos la función forzando el salto de validación
          procesarEnvio(true);
        } else {
          alert("Registro cancelado. No se generaron duplicados.");
        }
      } 
      // Si el registro fue completamente exitoso
      else if (respuesta.exito) {
        alert("✅ " + respuesta.mensaje);
        limpiarFormulario();
      } else {
        alert("⚠️ Error: " + respuesta.mensaje);
      }
    })
    .catch(err => {
      btn.disabled = false;
      btn.innerText = "Registrar Capacitación";
      alert("Error de conexión: " + err);
    });
  }

  // Limpia los campos operativos para quedar listos para la siguiente firma
  function limpiarFormulario() {
    document.getElementById('buscadorEmpleado').value = '';
    document.getElementById('idEmpleado').value = '';
    document.getElementById('puestoEmpleado').value = '';
    document.getElementById('selectActividad').value = '';
    document.getElementById('inputInstructor').value = '';
    document.getElementById('selectEstatus').value = 'Aprobado';
  }
</script>

</body>
</html>
