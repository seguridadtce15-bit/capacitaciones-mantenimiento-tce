<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Capacitaciones de Mantenimiento</title>
  <style>
    /* VARIABLES DE DISEÑO INDUSTRIAL MODO OSCURO */
    :root {
      --bg-principal: #121214;
      --bg-tarjeta: #1e1e24;
      --txt-principal: #f3f4f6;
      --txt-secundario: #9ca3af;
      --borde: #374151;
      --azul-acento: #3b82f6;
      --azul-active: #1d4ed8;
      --amarillo-alerta: #eab308;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-principal);
      margin: 0;
      padding: 12px;
      color: var(--txt-principal);
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-tarjeta);
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      border: 1px solid #2d2d34;
    }

    h2 {
      text-align: center;
      color: var(--txt-principal);
      margin-top: 0;
      font-size: 1.3rem;
      border-bottom: 2px solid var(--borde);
      padding-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--txt-secundario);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* INPUTS ADAPTADOS PARA PANTALLAS TÁCTILES MÓVILES */
    input[type="text"], select {
      width: 100%;
      padding: 14px; /* Tamaño ideal para manipulación con dedos */
      border: 1px solid var(--borde);
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 1rem;
      background-color: #2a2a32;
      color: var(--txt-principal);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--azul-acento);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }

    /* CONTENEDOR DE FIRMA TÁCTIL (CANVAS) */
    .firma-container {
      position: relative;
      margin-top: 6px;
    }

    canvas {
      width: 100%;
      height: 150px;
      background-color: #ffffff; /* Fondo blanco para contraste del trazo negro de la firma */
      border: 2px solid var(--borde);
      border-radius: 10px;
      touch-action: none; /* Crucial: Previene que la pantalla del cel se mueva al firmar */
      cursor: crosshair;
    }

    .firma-botones {
      display: flex;
      justify-content: flex-end;
      margin-top: 6px;
    }

    .btn-limpiar {
      padding: 6px 14px;
      background-color: #374151;
      color: #f3f4f6;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-limpiar:active {
      background-color: #4b5563;
    }

    /* BOTÓN PRINCIPAL DE REGISTRO */
    .btn-guardar {
      width: 100%;
      padding: 15px;
      background-color: var(--azul-acento);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 14px;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
      transition: background 0.2s;
    }

    .btn-guardar:active {
      background-color: var(--azul-active);
    }

    .btn-guardar:disabled {
      background-color: #4b5563;
      color: #9ca3af;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Registro de Capacitación</h2>
  
  <div class="form-group">
    <label for="buscadorEmpleado">Colaborador:</label>
    <input type="text" id="buscadorEmpleado" list="listaPersonal" placeholder="Escribe nombre del colaborador..." autocomplete="off">
    <datalist id="listaPersonal"></datalist>
    <input type="hidden" id="idEmpleado">
    <input type="hidden" id="puestoEmpleado">
  </div>

  <div class="form-group">
    <label for="selectActividad">Curso Impartido:</label>
    <select id="selectActividad">
      <option value="">Seleccione un curso...</option>
    </select>
  </div>

  <div class="form-group">
    <label for="inputInstructor">Instructor:</label>
    <input type="text" id="inputInstructor" placeholder="Nombre del instructor">
  </div>

  <div class="form-group">
    <label for="selectEstatus">Estatus:</label>
    <select id="selectEstatus">
      <option value="Aprobado">Aprobado</option>
      <option value="Pendiente">Pendiente</option>
      <option value="Reprobado">Reprobado</option>
    </select>
  </div>

  <div class="form-group">
    <label>Firma de Conformidad del Trabajador:</label>
    <div class="firma-container">
      <canvas id="canvasFirma"></canvas>
      <div class="firma-botones">
        <button type="button" class="btn-limpiar" onclick="limpiarFirma()">Borrar Trazo</button>
      </div>
    </div>
  </div>

  <button class="btn-guardar" id="btnRegistrar" onclick="procesarEnvio(false)">Registrar Capacitación</button>
</div>

<script>
  // ⚠️ REEMPLAZA CON LA URL DE TU WEB APP DE GOOGLE APPS SCRIPT
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJSDv3hfnZVAopXWGkwBOFK1wdzqijWzoECPJbqpdhed0IUOnz42JoMdiG1TTV3kMDBA/exec";

  let personalCache = [];
  let actividadesCache = [];
  
  // Variables de control del Canvas de firma
  const canvas = document.getElementById('canvasFirma');
  const ctx = canvas.getContext('2d');
  let dibujando = false;

  // Ajustar la resolución interna del canvas al iniciar
  window.addEventListener('DOMContentLoaded', () => {
    ajustarResolucionCanvas();
    inicializarEventosFirma();

    // Cargar catálogos desde Sheets
    fetch(WEB_APP_URL)
      .then(response => response.json())
      .then(data => {
        personalCache = data.personal;
        actividadesCache = data.actividades;
        renderAutocompletarPersonal(data.personal);
        renderSelectActividades(data.actividades);
      })
      .catch(err => alert("Error cargando catálogos: " + err));
  });

  function renderAutocompletarPersonal(personal) {
    const datalist = document.getElementById('listaPersonal');
    datalist.innerHTML = '';
    personal.forEach(emp => {
      const option = document.createElement('option');
      option.value = emp.nombre; 
      datalist.appendChild(option);
    });
  }

  function renderSelectActividades(actividades) {
    const select = document.getElementById('selectActividad');
    actividades.forEach(act => {
      const option = document.createElement('option');
      option.value = act.id;
      option.textContent = act.nombre;
      select.appendChild(option);
    });
  }

  document.getElementById('buscadorEmpleado').addEventListener('input', (e) => {
    const seleccionado = personalCache.find(emp => emp.nombre === e.target.value);
    if (seleccionado) {
      document.getElementById('idEmpleado').value = seleccionado.id;
      document.getElementById('puestoEmpleado').value = seleccionado.puesto;
    } else {
      document.getElementById('idEmpleado').value = '';
      document.getElementById('puestoEmpleado').value = '';
    }
  });

  // ==========================================
  // LÓGICA E INICIALIZACIÓN DE LA FIRMA TÁCTIL
  // ==========================================
  function ajustarResolucionCanvas() {
    // Sincroniza el tamaño de dibujo con el tamaño visual CSS
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000000"; // Tinta negra para almacenamiento limpio en Drive
  }

  function inicializarEventosFirma() {
    // Eventos para Computadora (Mouse)
    canvas.addEventListener('mousedown', (e) => { dibujando = true; dibujar(e); });
    canvas.addEventListener('mousemove', dibujar);
    window.addEventListener('mouseup', () => dibujando = false);

    // Eventos para Celular (Touch screens)
    canvas.addEventListener('touchstart', (e) => {
      dibujando = true;
      const touch = e.touches[0];
      const pos = obtenerPosicionFirma(touch);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      e.preventDefault();
    });
    
    canvas.addEventListener('touchmove', (e) => {
      if (!dibujando) return;
      const touch = e.touches[0];
      const pos = obtenerPosicionFirma(touch);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      e.preventDefault();
    });
    
    canvas.addEventListener('touchend', () => dibujando = false);
  }

  function obtenerPosicionFirma(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX || e.pageX) - rect.left,
      y: (e.clientY || e.pageY) - rect.top
    };
  }

  function dibujar(e) {
    if (!dibujando) return;
    const pos = obtenerPosicionFirma(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
  }

  function limpiarFirma() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ajustarResolucionCanvas();
  }

  function canvasEstaVacio() {
    // Valida si el trabajador pintó algo o dejó el recuadro intacto
    const buffer = new Uint32Array(ctx.getImageData(0, 0, canvas.width, canvas.height).data.buffer);
    return !buffer.some(color => color !== 0);
  }

  // ==========================================
  // PROCESAMIENTO Y ENVÍO DEL FORMULARIO
  // ==========================================
  function procesarEnvio(forzar = false) {
    const idEmp = document.getElementById('idEmpleado').value;
    const nombreEmp = document.getElementById('buscadorEmpleado').value;
    const puestoEmp = document.getElementById('puestoEmpleado').value;
    const idAct = document.getElementById('selectActividad').value;
    const instructor = document.getElementById('inputInstructor').value;
    const estatus = document.getElementById('selectEstatus').value;

    const selectAct = document.getElementById('selectActividad');
    const nombreAct = selectAct.options[selectAct.selectedIndex]?.text || '';

    if (!idEmp || !idAct) {
      alert("⚠️ Por favor seleccione un Colaborador de la lista y un Curso.");
      return;
    }

    if (canvasEstaVacio()) {
      alert("⚠️ Se requiere la firma del colaborador como evidencia de la capacitación.");
      return;
    }

    // Extraemos la firma del canvas directo a string Base64 transparente
    const firmaImagenBase64 = canvas.toDataURL('image/png');

    const payloadData = {
      idEmpleado: idEmp,
      nombreEmpleado: nombreEmp,
      puestoEmpleado: puestoEmp,
      idActividad: idAct,
      nombreActividad: nombreAct,
      instructor: instructor || "Sin Instructor",
      estatus: estatus,
      firmaBase64: firmaImagenBase64,
      forzarGuardado: forzar
    };

    const btn = document.getElementById('btnRegistrar');
    btn.disabled = true;
    btn.innerText = "Guardando en Servidor...";

    fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({
        accion: "guardar",
        payload: payloadData
      })
    })
    .then(res => res.json())
    .then(respuesta => {
      btn.disabled = false;
      btn.innerText = "Registrar Capacitación";

      if (!respuesta.exito && respuesta.duplicado) {
        const volverARegistrar = confirm(respuesta.mensaje);
        if (volverARegistrar) {
          procesarEnvio(true);
        } else {
          alert("Registro cancelado. No se generaron duplicados.");
        }
      } 
      else if (respuesta.exito) {
        alert("✅ " + respuesta.mensaje);
        limpiarFormulario();
      } else {
        alert("⚠️ Error: " + respuesta.mensaje);
      }
    })
    .catch(err => {
      btn.disabled = false;
      btn.innerText = "Registrar Capacitación";
      alert("Error de conexión: " + err);
    });
  }

  function limpiarFormulario() {
    document.getElementById('buscadorEmpleado').value = '';
    document.getElementById('idEmpleado').value = '';
    document.getElementById('puestoEmpleado').value = '';
    document.getElementById('selectActividad').value = '';
    document.getElementById('inputInstructor').value = '';
    document.getElementById('selectEstatus').value = 'Aprobado';
    limpiarFirma();
  }
  
  // Ajustar canvas si el operador gira la pantalla del celular
  window.addEventListener('resize', ajustarResolucionCanvas);
</script>

</body>
</html>
