<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Capacitaciones de Mantenimiento</title>
  <style>
    :root {
      --bg-principal: #121214;
      --bg-tarjeta: #1e1e24;
      --txt-principal: #f3f4f6;
      --txt-secundario: #9ca3af;
      --borde: #374151;
      --azul-acento: #3b82f6;
      --azul-active: #1d4ed8;
      --verde-exito: #10b981;
      --rojo-alerta: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-principal);
      margin: 0;
      padding: 12px;
      color: var(--txt-principal);
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg-tarjeta);
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      border: 1px solid #2d2d34;
    }

    .header-empresa {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--borde);
    }

    .logo-empresa {
      width: 50px;
      height: 50px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .titulo-empresa {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--txt-secundario);
      text-transform: uppercase;
    }

    input[type="text"], select {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--borde);
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 1rem;
      background-color: #2a2a32;
      color: var(--txt-principal);
    }

    .status-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .panel-cursos {
      background: #25252d;
      border-radius: 8px;
      padding: 10px;
      border: 1px solid var(--borde);
      max-height: 150px;
      overflow-y: auto;
    }

    .panel-titulo {
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--borde);
    }

    .titulo-completados { color: var(--verde-exito); }
    .titulo-faltantes { color: var(--rojo-alerta); }

    .lista-items {
      margin: 0;
      padding-left: 14px;
      font-size: 0.8rem;
    }

    canvas {
      width: 100%;
      height: 130px;
      background-color: #ffffff;
      border: 2px solid var(--borde);
      border-radius: 10px;
      touch-action: none;
    }

    .btn-guardar {
      width: 100%;
      padding: 15px;
      background-color: var(--azul-acento);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-empresa">
    <div class="textos-header">
      <h1 class="titulo-empresa">Terminales de Cargas Especializadas S.A. de C.V.</h1>
    </div>
  </div>
  
  <div class="form-group">
    <label for="buscadorEmpleado">Colaborador:</label>
    <input type="text" id="buscadorEmpleado" list="listaPersonal" autocomplete="off">
    <datalist id="listaPersonal"></datalist>
    <input type="hidden" id="idEmpleado">
    <input type="hidden" id="puestoEmpleado">
  </div>

  <div class="status-container">
    <div id="msgCargando" style="display:none; color:#eab308; grid-column:span 2;">Consultando...</div>
    <div class="panel-cursos">
      <div class="panel-titulo titulo-completados">✓ Realizados</div>
      <ul id="listaCompletados" class="lista-items"></ul>
    </div>
    <div class="panel-cursos">
      <div class="panel-titulo titulo-faltantes">✗ Pendientes</div>
      <ul id="listaFaltantes" class="lista-items"></ul>
    </div>
  </div>

  <div class="form-group">
    <label for="selectActividad">Curso Impartido:</label>
    <select id="selectActividad"><option value="">Seleccione un curso...</option></select>
  </div>

  <div class="form-group">
    <label for="inputInstructor">Instructor:</label>
    <input type="text" id="inputInstructor">
  </div>

  <div class="form-group">
    <label for="selectEstatus">Estatus:</label>
    <select id="selectEstatus">
      <option value="Aprobado">Aprobado</option>
      <option value="Pendiente">Pendiente</option>
      <option value="Reprobado">Reprobado</option>
    </select>
  </div>

  <div class="form-group">
    <label>Firma:</label>
    <canvas id="canvasFirma"></canvas>
    <button type="button" onclick="limpiarFirma()">Borrar Trazo</button>
  </div>

  <button class="btn-guardar" id="btnRegistrar" onclick="procesarEnvio(false)">Registrar Capacitación</button>
</div>

<script>
  // ⚠️ PON AQUÍ TU URL DE GOOGLE APPS SCRIPT
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyv_-KpOnJuP-11BxRpWYEsAZGEVIMy_BS9MuYuzpLosF5TYyNVPcRg9R9-3UZzaKWvdw/exec";

  // --- El resto de tu lógica JS se mantiene igual ---
  let personalCache = [];
  const canvas = document.getElementById('canvasFirma');
  const ctx = canvas.getContext('2d');
  let dibujando = false;

  window.addEventListener('DOMContentLoaded', () => {
    ajustarResolucionCanvas();
    inicializarEventosFirma();
    fetch(WEB_APP_URL)
      .then(r => r.json())
      .then(data => {
        personalCache = data.personal;
        renderAutocompletar(data.personal);
        renderSelect(data.actividades);
      });
  });

  function ajustarResolucionCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
  }

  function inicializarEventosFirma() {
    canvas.addEventListener('mousedown', (e) => { dibujando = true; });
    canvas.addEventListener('mousemove', (e) => { if(dibujando) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
    canvas.addEventListener('mouseup', () => { dibujando = false; ctx.beginPath(); });
    // Agregar aquí tus eventos touch si los tenías...
  }

  function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

  function procesarEnvio(forzar) {
    const payloadData = {
      idEmpleado: document.getElementById('idEmpleado').value,
      nombreEmpleado: document.getElementById('buscadorEmpleado').value,
      idActividad: document.getElementById('selectActividad').value,
      instructor: document.getElementById('inputInstructor').value,
      estatus: document.getElementById('selectEstatus').value,
      firmaBase64: canvas.toDataURL('image/png'),
      forzarGuardado: forzar
    };

    fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify({ accion: "guardar", payload: payloadData })
    })
    .then(r => r.json())
    .then(res => {
        if (res.duplicado) {
            if(confirm(res.mensaje)) procesarEnvio(true);
        } else {
            alert(res.mensaje);
        }
    });
  }
  
  function renderAutocompletar(personal) { /* tu función original */ }
  function renderSelect(actividades) { /* tu función original */ }
</script>
</body>
</html>
